services:
  - type: web
    name: curios-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-1.5-flash
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: NVIDIA_API_KEY
        sync: false
      - key: NVIDIA_MODEL
        value: mistralai/mistral-medium-3.5-128b
      - key: ANALYSIS_MODEL
        value: mistralai/mistral-7b-instruct-v03
      - key: USE_OLLAMA
        value: false
